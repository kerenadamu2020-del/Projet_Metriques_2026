<html>
<head>
  <meta charset="UTF-8"/>
  <title>Visibilité Strasbourg</title>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }

    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 25px;
      padding: 40px;
      width: 95%;
      max-width: 1000px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    h2 {
      color: #ffffff;
      font-size: 26px;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .subtitle {
      color: #90caf9;
      text-align: center;
      font-size: 14px;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    #chart_div {
      border-radius: 15px;
      overflow: hidden;
    }

    .footer {
      margin-top: 20px;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      text-align: center;
    }
  </style>
  <script>
    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(drawChart);

    function drawChart() {
      fetch('/atelier-data')
        .then(response => response.json())
        .then(data => {
          var chartData = [['Heure', 'Visibilité (m)']];
          data.forEach(function(item) {
            chartData.push([item.datetime, item.visibility]);
          });

          var dataTable = google.visualization.arrayToDataTable(chartData);

          var options = {
            title: 'Visibilité à Strasbourg - 7 prochains jours',
            titleTextStyle: { color: '#ffffff', fontSize: 16, bold: true },
            backgroundColor: 'transparent',
            colors: ['#29b6f6'],
            areaOpacity: 0.4,
            legend: { position: 'none' },
            hAxis: {
              title: 'Date & Heure',
              textStyle: { color: '#90caf9' },
              titleTextStyle: { color: '#90caf9' },
              slantedText: true,
              slantedTextAngle: 45,
              showTextEvery: 24
            },
            vAxis: {
              title: 'Visibilité (mètres)',
              textStyle: { color: '#90caf9' },
              titleTextStyle: { color: '#90caf9' },
              gridlines: { color: 'rgba(255,255,255,0.1)' },
              baselineColor: 'rgba(255,255,255,0.2)'
            },
            chartArea: { width: '85%', height: '65%' },
            tooltip: { textStyle: { color: '#0f2027' } }
          };

          var chart = new google.visualization.AreaChart(document.getElementById('chart_div'));
          chart.draw(dataTable, options);
        });
    }
  </script>
</head>
<body>
  <div class="card">
    <h2>🌫️ Visibilité — Strasbourg</h2>
    <p class="subtitle">Prévisions sur 7 jours • Source: Open-Meteo API</p>
    <div id="chart_div" style="width: 100%; height: 500px;"></div>
    <p class="footer">Données fournies par open-meteo.com</p>
  </div>
</body>
</html>
