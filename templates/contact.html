<html>
<head>
  <meta charset="UTF-8"/>
  <title>Contact</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Quicksand:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(135deg, #ffe6f0, #ffb6c1, #ff85a1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hearts {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 0;
    }

    .heart {
      position: absolute;
      font-size: 24px;
      animation: floatUp linear infinite;
      opacity: 0.6;
    }

    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0.5); opacity: 0.8; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(15px);
      border: 2px solid rgba(255,182,193,0.6);
      border-radius: 30px;
      padding: 50px 40px;
      width: 460px;
      box-shadow: 0 20px 60px rgba(255,105,135,0.3);
      text-align: center;
    }

    .flower { font-size: 40px; margin-bottom: 5px; }

    h2 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: #d63384;
      font-size: 30px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #f48fb1;
      font-size: 13px;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    label {
      display: block;
      text-align: left;
      color: #c2185b;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    input, textarea {
      width: 100%;
      padding: 13px 18px;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.8);
      border: 2px solid #f8bbd0;
      border-radius: 15px;
      color: #880e4f;
      font-size: 15px;
      font-family: 'Quicksand', sans-serif;
      outline: none;
      transition: border 0.3s, box-shadow 0.3s;
    }

    input:focus, textarea:focus {
      border-color: #d63384;
      box-shadow: 0 0 12px rgba(214,51,132,0.2);
    }

    input::placeholder, textarea::placeholder { color: #f48fb1; }
    textarea { height: 120px; resize: none; }

    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #f06292, #e91e8c, #d63384);
      border: none;
      border-radius: 15px;
      color: white;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Quicksand', sans-serif;
      cursor: pointer;
      letter-spacing: 2px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 25px rgba(214,51,132,0.4);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(214,51,132,0.5);
    }

    .footer {
      margin-top: 20px;
      font-size: 18px;
      letter-spacing: 5px;
    }
  </style>
</head>
<body>

  <!-- Floating hearts -->
  <div class="hearts" id="hearts"></div>

  <div class="card">
    <div class="flower">🌸🌺🌸</div>
    <h2>Contactez-moi</h2>
    <p class="subtitle">✨ Je serais ravie d'avoir de vos nouvelles ✨</p>

    <label>🌷 Prénom</label>
    <input type="text" placeholder="Votre prénom..."/>

    <label>🌷 Nom</label>
    <input type="text" placeholder="Votre nom..."/>

    <label>💌 Message</label>
    <textarea placeholder="Votre message..."></textarea>

    <button>💕 Envoyer 💕</button>

    <div class="footer">🌸 💗 🌺 💗 🌸</div>
  </div>

  <script>
    const heartsContainer = document.getElementById('hearts');
    const emojis = ['💕', '🌸', '💗', '🌺', '💖', '🌷', '💓'];

    for (let i = 0; i < 25; i++) {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerText = emojis[Math.floor(Math.random() * emojis.length)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.fontSize = (16 + Math.random() * 20) + 'px';
      heart.style.animationDuration = (4 + Math.random() * 8) + 's';
      heart.style.animationDelay = (Math.random() * 6) + 's';
      heartsContainer.appendChild(heart);
    }
  </script>

</body>
</html>
